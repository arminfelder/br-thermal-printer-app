name: Bump Version & Changelog

on:
  workflow_dispatch:
    inputs:
      increment:
        description: 'Version increment (leave empty for auto)'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install commitizen
        run: pip install commitizen

      - name: Bump version and generate changelog
        run: |
          if [ "${{ github.event.inputs.increment }}" = "auto" ] || [ -z "${{ github.event.inputs.increment }}" ]; then
            cz bump --changelog
          else
            cz bump --changelog --increment ${{ github.event.inputs.increment }}
          fi

      - name: Push tag and changelog
        run: git push --follow-tags
