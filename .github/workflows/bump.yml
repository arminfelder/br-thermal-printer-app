name: Bump Version & Changelog

on:
  push:
    branches: [main]

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GIT_GPG }}
          passphrase: ${{ secrets.GIT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          trust_model: ultimate

      - name: GPG user IDs
        run: |
          echo "fingerprint: ${{ steps.import-gpg.outputs.fingerprint }}"
          echo "keyid:       ${{ steps.import-gpg.outputs.keyid }}"
          echo "name:        ${{ steps.import-gpg.outputs.name }}"
          echo "email:       ${{ steps.import-gpg.outputs.email }}"

      - name: Configure git
        run: |
          git config --global user.email "${{ steps.import-gpg.outputs.email }}"
          git config --global user.name "${{ steps.import-gpg.outputs.name }}"
          git config --global push.gpgSign false

      - name: Install dependencies
        run: |
          sudo apt-get install -y devscripts
          pip install commitizen

      - name: Bump version and generate changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBEMAIL: ${{ steps.import-gpg.outputs.email }}
          DEBFULLNAME: ${{ steps.import-gpg.outputs.name }}
        run: |
          if cz bump --changelog --yes; then
            NEW_TAG=$(git describe --tags --abbrev=0)
            git commit --amend --no-edit -S
            git tag -f "$NEW_TAG" HEAD
            git push origin HEAD:main
            git push -f origin "refs/tags/$NEW_TAG"
            gh workflow run release.yml --ref "$NEW_TAG"
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 21 ]; then
              echo "No version bump needed, skipping"
            else
              exit $EXIT_CODE
            fi
          fi
