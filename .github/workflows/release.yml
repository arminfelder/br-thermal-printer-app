name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/_test.yml

  build-deb-amd64:
    uses: ./.github/workflows/_build-deb.yml
    with:
      arch: amd64

  build-deb-arm64:
    uses: ./.github/workflows/_build-deb.yml
    with:
      arch: arm64

  build-deb-riscv64:
    uses: ./.github/workflows/_build-deb.yml
    with:
      arch: riscv64

  release:
    needs: [test, build-deb-amd64, build-deb-arm64, build-deb-riscv64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for tag
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## $VERSION/{flag=1; next} /^## [0-9]/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: br-thermal-trixie-*-deb
          path: packages/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: packages/*
